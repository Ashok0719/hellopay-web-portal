name: Build HelloPay APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Assemble Neural Node (APK)
      run: |
        cd android-app
        # Build with full trace for high-fidelity auditing
        gradle assembleDebug --no-daemon --stacktrace

    - name: Release Asset to Matrix
      uses: actions/upload-artifact@v4
      with:
        name: hellopay-apk
        path: android-app/app/build/outputs/apk/debug/app-debug.apk
